spring:
  datasource:
    url: jdbc:mysql://localhost:3306/diabetes_health?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    # 用户名：填 MySQL 登录名（如 root），不是主机名或 localhost:3306
    username: root
    # 密码：填该用户对应的 MySQL 登录密码
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true

server:
  port: 8080

app:
  jwt:
    # 至少 32 字符，用于 HS256 签名
    secret: change-this-secret-to-a-strong-value-at-least-32chars
    expiration-seconds: 604800 # 7 days

