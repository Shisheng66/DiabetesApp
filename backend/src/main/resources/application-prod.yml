# 生产环境配置
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/diabetes_health?useSSL=true&allowPublicKeyRetrieval=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 生产环境连接池配置
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false

logging:
  level:
    root: WARN
    com.diabetes.health: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: OFF

app:
  jwt:
    secret: ${JWT_SECRET:prod-secret-key-must-be-changed-in-environment-variables-32chars}
    expiration-seconds: 259200  # 3 days
