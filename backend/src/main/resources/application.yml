spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:./backend/.env[.properties]
  profiles:
    default: dev
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:diabetes_health}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-please-change-in-prod-32chars}
    expiration-seconds: 604800
  auth:
    captcha-expire-seconds: 180
    sms-expire-seconds: 300
    sms-cooldown-seconds: 60
    expose-debug-sms-code: ${APP_AUTH_EXPOSE_DEBUG_SMS_CODE:true}
