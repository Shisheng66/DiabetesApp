# Production profile
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/diabetes_health?useSSL=true&allowPublicKeyRetrieval=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    show-sql: false

  cache:
    type: simple

logging:
  level:
    root: WARN
    com.diabetes.health: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: OFF

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-seconds: 259200
  auth:
    captcha-expire-seconds: 180
    sms-expire-seconds: 300
    sms-cooldown-seconds: 60
    expose-debug-sms-code: ${APP_AUTH_EXPOSE_DEBUG_SMS_CODE:false}
